spring.datasource.url=jdbc:postgresql://localhost:5432/tourlogdb
spring.datasource.username=tourlog_user
spring.datasource.password=tourlog_password
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.defer-datasource-initialization=true
# Run SQL initialization scripts every time the application starts.
spring.sql.init.mode=always
