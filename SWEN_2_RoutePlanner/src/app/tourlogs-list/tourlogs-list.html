<article class="card shadow-sm">
  <div class="card-body">
    <div class="d-flex justify-content-between align-items-center mb-2">
      <h3 class="h6 mb-0">Tour log</h3>
      <span class="badge text-bg-secondary">{{ log.date }}</span>
    </div>

    <div class="small text-secondary mb-2">Time: {{ log.time }}</div>
    <div class="mb-0">{{ log.comment }}</div>
  </div>
</article>
