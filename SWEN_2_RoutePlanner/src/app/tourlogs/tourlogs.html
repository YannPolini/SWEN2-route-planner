<section class="app-home">
  <p>tourlogs works!</p>

  <div>
    <label for="date">Datum eingeben: </label>
    <input 
        id="date"
        class="input"
        type="date"
        [(ngModel)]="date"
    />
    <h2> {{ date }} </h2>
    <label for="time">Zeit eingeben: </label>
    <input 
        id="time"
        class="input"
        type="time"
        [(ngModel)]="time"
    />
    <h2> {{ time }} </h2>
    <label for="comment">Kommentar: </label>
    <input
        id="comment" 
        class="input"
        type="text"
        [(ngModel)]="comment"
        placeholder="comment"
    />
    <h2>{{ comment }}</h2>
  </div>
</section>
